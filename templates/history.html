<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歴</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="phone-frame">
        <header class="top-bar">
            <a href="/list" class="back-button">‹</a>
            <h1>履歴</h1>
            <div class="top-bar-space"></div>
        </header>

        <main class="content">
            <div class="history-summary">
                <div class="summary-box">
                    <span class="summary-label">商品数</span>
                    <span class="summary-value">{{ data|length }}</span>
                </div>
            </div>

            <div class="history-list">
                {% for row in data %}
                <div class="history-row">
                    <div class="history-left">
                        <div class="item-name">{{ row[0] }}</div>
                        <div class="item-meta">個数合計 {{ row[1] }}</div>
                    </div>
                    <div class="history-right">¥{{ row[2] }}</div>
                </div>
                {% endfor %}
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="/" class="nav-item">入力</a>
            <a href="/list" class="nav-item">在庫</a>
            <a href="/history" class="nav-item active">履歴</a>
            <a href="/monthly" class="nav-item">月別</a>
        </nav>
    </div>
</body>
</html>
